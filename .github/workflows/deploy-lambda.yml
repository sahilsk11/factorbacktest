name: Deploy Lambda

on:
  push:
    branches: ["master"]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-lambda-main
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "326651360928"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/factorbacktest-github-deploy
          role-session-name: factorbacktest-github-deploy

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Deploy Lambda
        run: make deploy-lambda
