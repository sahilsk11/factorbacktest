name: E2E

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Matches cmd/test-api/main.go -> createTestDbManager(5440) and the
    # existing Go CI convention of mapping Postgres to host port 5440.
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5440:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-archived/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-archived
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend-archived
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend-archived
        run: npx playwright test

      - name: Upload test-results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend-archived/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload playwright-report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-archived/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
