name: E2E Tests

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: postgres_test
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5440:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25.0

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: 3.12

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tools/requirements.txt

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Install Playwright browsers
      working-directory: frontend
      run: npx playwright install chromium --with-deps

    - name: Apply migrations
      run: python3 tools/migrations.py up postgres_test

    - name: Start backend
      run: |
        export ALPHA_ENV=test
        go run cmd/api/main.go > backend.log 2>&1 &
        echo "Backend PID: $!"

    - name: Start frontend
      working-directory: frontend
      run: |
        npm start > frontend.log 2>&1 &
        echo "Frontend PID: $!"

    - name: Wait for services
      run: |
        echo "Waiting for backend..."
        counter=0
        max_retries=15
        while ! curl -sSf http://localhost:3009/; do
          echo "Waiting for backend..."
          sleep 3
          counter=$((counter+1))
          if [ $counter -ge $max_retries ]; then
            echo "Backend did not become ready after $max_retries attempts."
            cat backend.log
            exit 1
          fi
        done
        echo "Backend is ready!"

        echo "Waiting for frontend..."
        counter=0
        max_retries=20
        while ! curl -sSf http://localhost:3000/ 2>/dev/null; do
          echo "Waiting for frontend..."
          sleep 3
          counter=$((counter+1))
          if [ $counter -ge $max_retries ]; then
            echo "Frontend did not become ready after $max_retries attempts."
            cat frontend.log
            exit 1
          fi
        done
        echo "Frontend is ready!"

    - name: Run E2E tests
      working-directory: frontend
      run: npm run test:e2e
      env:
        CI: true
        ALPHA_ENV: test