name: Frontend E2E

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - 'api/**'
      - 'internal/**'
      - 'tools/**'
      - 'cmd/**'
      - '.github/workflows/frontend-e2e.yml'
  pull_request:
    branches: [master]
    paths:
      - 'frontend/**'
      - 'api/**'
      - 'internal/**'
      - 'tools/**'
      - 'cmd/**'
      - '.github/workflows/frontend-e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: postgres_test
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5440:5432

    steps:
      - uses: actions/checkout@v4

      # 1. Run migrations
      - name: Run migrations
        env:
          ALPHA_ENV: test
        run: python3 tools/migrations.py up postgres_test

      # 2. Seed database
      - name: Seed database
        env:
          ALPHA_ENV: test
        run: go run cmd/seed-e2e/main.go

      # 3. Start backend (background)
      - name: Start backend
        env:
          ALPHA_ENV: test
        run: |
          go run cmd/api/main.go > backend.log 2>&1 &
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -s http://localhost:3009/ > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            echo "Waiting... ($i)"
            sleep 2
          done

      # 4. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 5. Install + build frontend
      - name: Install and build frontend
        working-directory: ./frontend
        run: npm ci && npm run build

      # 6. Serve frontend (background)
      - name: Serve frontend
        run: npx serve -s frontend/build -l 3000 &

      # 7. Wait for frontend
      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready!"
              break
            fi
            echo "Waiting for frontend... ($i)"
            sleep 2
          done

      # 8. Install Playwright browsers
      - name: Install Playwright
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps

      # 9. Run Playwright tests
      - name: Run E2E tests
        working-directory: ./frontend
        env:
          BACKEND_URL: http://localhost:3009
        run: npx playwright test
