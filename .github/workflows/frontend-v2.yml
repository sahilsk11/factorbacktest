name: frontend-v2

on:
  pull_request:
    paths:
      - 'frontend-v2/**'
      - '.github/workflows/frontend-v2.yml'
  push:
    branches: [master]
    paths:
      - 'frontend-v2/**'
      - '.github/workflows/frontend-v2.yml'

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: frontend-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
