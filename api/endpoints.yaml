# API Endpoint Definitions
# This file defines all API endpoints. Run `make generate-api` to:
# - Generate request/response Go structs
# - Generate resolver file stubs (if missing)
# - Update api.go router registration
# - Generate Terraform for API Gateway

endpoints:
  - path: /updateOrders
    method: POST
    handler: updateOrders
    requires_auth: false
    generate_resolver: false
    request:
    response:
      success: string
    aws:
      integration_type: lambda_proxy
      timeout: 30

  - path: /sendSavedStrategySummaryEmails
    method: POST
    handler: sendSavedStrategySummaryEmails
    requires_auth: false
    request:
      # Empty object means no request body
    response:
      message: string
    aws:
      integration_type: lambda_proxy
      timeout: 30

  # Async Backtest Endpoints
  # POST /backtest/async - starts an async backtest job and returns immediately
  - path: /backtest/async
    method: POST
    handler: backtestAsync
    requires_auth: true
    request:
      factorExpression: string
      factorName: string
      backtestStart: string
      backtestEnd: string
      samplingIntervalUnit: string
      startCash: float64
      assetUniverse: string
      numSymbols: int
      userID: string?
    response:
      backtestJobId: string
      strategyId: string
    aws:
      integration_type: lambda_proxy
      timeout: 30

  # GET /backtest/{backtestJobId}/status - poll for job status
  - path: /backtest/status
    method: GET
    handler: backtestStatus
    requires_auth: true
    request:
      backtestJobId: string
    response:
      backtestJobId: string
      status: string
      currentStage: string
      progressPct: int
      errorMessage: string?
      result: object?
    aws:
      integration_type: lambda_proxy
      timeout: 30
