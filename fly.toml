app = "factorbacktest"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  FB_SECRETS_FROM_ENV = "1"
  GIN_MODE = "release"

[http_service]
  internal_port = 3009
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "get"
    path = "/"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
