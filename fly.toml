app = "factorbacktest"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[deploy]
  # Run pending DB migrations before the new app version takes traffic. Fly
  # runs this in a temp VM with full app secrets injected (FB_SECRETS_FROM_ENV
  # gives the binary the same db creds the API uses). A non-zero exit aborts
  # the release, so a broken migration leaves prod on the previous version
  # rather than half-migrated.
  release_command = "/app/migrate"

[env]
  FB_SECRETS_FROM_ENV = "1"
  GIN_MODE = "release"

  # Public base URL of the Go API. The internal/auth package uses this as
  # the OAuth redirect_uri host and as the issuer on internal tokens.
  APP_BASE_URL = "https://api.factor.trade"
  # Where the Google OAuth callback redirects on success. Must match the FE
  # origin (where users come from). The auth package never accepts a
  # redirect target from query params; this env var is the only way to
  # change it.
  FACTOR_AUTH_FRONTEND_BASE_URL = "https://factor.trade"

[http_service]
  internal_port = 3009
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine warm so users don't eat the cold-start hit (Go API +
  # Postgres TLS handshake) on the first request after a quiet period.
  min_machines_running = 1

  [[http_service.checks]]
    method = "get"
    path = "/"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
